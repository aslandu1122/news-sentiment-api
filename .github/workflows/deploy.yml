name: Deploy to Tencent SCF
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Tencent Cloud CLI
        run: |
          # 安装腾讯云CLI，而非使用Docker
          pip install tencentcloud-sdk-python tccli

      - name: Deploy Function
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          FUNCTION_NAME: ${{ secrets.TENCENT_FUNCTION_NAME }}
          REGION: ${{ secrets.TENCENT_REGION }}
        run: |
          # 设置认证信息
          tccli configure set secret-id $TENCENT_SECRET_ID
          tccli configure set secret-key $TENCENT_SECRET_KEY
          tccli configure set region $REGION
          # 运行部署脚本
          bash scripts/deploy.sh