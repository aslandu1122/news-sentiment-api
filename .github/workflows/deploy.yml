name: Deploy to Tencent SCF with Python SDK

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install Tencent Cloud SDK
        run: |
          pip install tencentcloud-sdk-python
          pip install tencentcloud-sdk-python-scf

      - name: Deploy Function
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_FUNCTION_NAME: ${{ secrets.TENCENT_FUNCTION_NAME }}
          TENCENT_REGION: ${{ secrets.TENCENT_REGION }}
        run: |
          python deploy_with_sdk.py